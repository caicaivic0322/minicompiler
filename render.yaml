services:
  - type: web
    name: minicompiler-api
    env: node
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PISTON_TIMEOUT_MS
        value: 12000
      - key: PISTON_CACHE_TTL_MS
        value: 300000
      - key: PISTON_CACHE_MAX_ENTRIES
        value: 100

  - type: static
    name: minicompiler-web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: minicompiler-api
          envVarKey: RENDER_EXTERNAL_URL
